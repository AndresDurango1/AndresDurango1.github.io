<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./CSS/estilos_index.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11.0.18/dist/sweetalert2.min.css">
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.0.18/dist/sweetalert2.all.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <title>TIGO POSVENTAS</title>
</head>
<body>
    <!--Inicialmente se debe validar si se està trabajando en un dispositivo mòvil y se envìa la alerta para solicitar la rotacion del dispositivo-->
    <!--Poner un SweetAlert para que se vea mejor la alerta de rotar el dispositivo-->
    <div id="contenedorVideoInicial">
        <div id="contenedorVideoRigo">
            <video id="videoTiendaRigo" src="./recursos/videos/tienda_b2c.mp4" controls ></video>
        </div>
        <!--Una vez que se termina el vìdeo se oculta el contenedor de este video, en simultaneo se cambia la imagen de fondo por la imagen de transiciòn donde se tendran dos botones
                uno cargará en la misma pagina el contenedor de los videos, el otro debe llevar a la pagina de juegos-->
        <div id="contenedorImagenTransicion">
            <img id="imagenTransicion" src="./recursos/img/escritorio.png" alt="">
            <video id ="videoInmersion" src="./recursos/videos/inmersion.mp4"></video>
            <button id="btnVerVideos" onclick="verVideos()">VER VIDEOS</button>
        </div>
    </div>
    <div id="contenedorPrincipal">

                        <div class="archivo">Archivo</div>
                        <div class="inicio">Inicio</div>
                        <div class="compartir">Compartir</div>
                        <div class="vista">Vista</div>
                    </div>
                    <div class="botones">
                        <img src="./recursos/img/windw_l.png" alt="">

                </div>
                <!-- Segunda línea: Recuadros -->
                <div class="contenedor2">
                    <div class="titulo">VIDEOS POST VENTAS BÁSICAS</div>
                    <div class="recargar">
                        <img src="./recursos/img/recargar.png" alt="">
                    </div>
                    <div class="buscar">BUSCAR</div>
                </div>
            </div>
            <div id="contenedorBody">

                    </div>

                    <div class="gridItem3">
                        <img id="imgIconoVideo0" class="img1" src="./recursos/img/carpetadevideosIconoVideo-copia.jpg"

                    </div>
                    <div class="gridItem4">
                        <img id="imgIconoVideo1" class="img1" src="./recursos/img/carpetadevideosIconoVideo-copia.jpg"

                    </div>
                    <div class="gridItem5">

                    </div>
                    <div class="gridItem6">

                    </div>
                    <div class="gridItem7">
                        <img id="imgIconoVideo4" class="img1" src="./recursos/img/carpetadevideosIconoVideo-copia.jpg"
                            alt="">
                        <img id="imgProcesoReposicion" class="imagen5" src="./recursos/img/4-COPIA.png" alt="" onclick="reproducirVideo(4)">
                    </div>
                    <div class="gridItem8">
                        <img id="imgIconoVideo5" class="img1" src="./recursos/img/carpetadevideosIconoVideo-copia.jpg"

                    </div>
                    <div class="gridItem9">

                    </div>

                            <video id="video8" src="./recursos/videos/video8.mp4" controls></video>
                        </div>

    <script>
        document.addEventListener('DOMContentLoaded', (event) => {
            const contenedor = document.getElementById('contenedorPrincipal');
            contenedor.style.display = 'none';
        });
    </script>
    <script src="./JS/transicion.js"></script>
