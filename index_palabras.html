<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego de Palabras Desordenadas</title>
<link rel="stylesheet" href="./CSS/estilos_palabras.css">
</head>
<body>
<div id="container">
    <h1 class="container-tittle">Juego de Palabras Desordenadas</h1>
    <div id="word-container">Palabra desordenada: <span id="scrambled-word"></span></div>
    <div class="sub-container">
        <input type="text" id="user-input" placeholder="Ingresa la palabra ordenada">
        <button id="check-button">Comprobar</button>    
    </div>
    <div id="result"></div>
    <a type="button" href="./menu_juego.html" class="boton-regresar">Regresar</a>
</div>
<script src="./JS/script_palabras.js"></script>
</body>
</html>
